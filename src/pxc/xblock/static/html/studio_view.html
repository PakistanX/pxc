<div class="wrapper-comp-settings is-active editor-with-buttons" id="settings-tab">
  <ul class="list-input settings-list">

    <li class="field comp-setting-entry is-set">
      <div class="wrapper-comp-setting">
        <label class="label setting-label" for="pxc-display-name">Display Name</label>
        <input class="input setting-input" name="display_name" id="pxc-display-name" value="{{display_name}}" type="text" />
      </div>
      <span class="tip setting-help">The name that students see for this component.</span>
    </li>

    <li class="field comp-setting-entry is-set">
      <div class="wrapper-comp-setting">
        <label class="label setting-label" for="pxc-activity-select">Activity</label>
        <select class="input setting-input" name="activity_slug" id="pxc-activity-select">
          <option value="">— select —</option>
          {% for slug in activities %}
          <option value="{{slug}}"{% if slug == current_slug %} selected{% endif %}>{{slug}}</option>
          {% endfor %}
        </select>
      </div>
    </li>

  </ul>

  <div class="xblock-actions">
    <ul>
      <li class="action-item">
        <a href="#" class="button action-primary save-button">Save</a>
      </li>
      <li class="action-item">
        <a href="#" class="button cancel-button">Cancel</a>
      </li>
    </ul>
  </div>
</div>
