{% extends "index.html" %}

{% block title %}{{ activity_context.title or "Activity" }}{% endblock %}

{% block body %}
<script type="module">
import { PXC } from "{{ url_for('static', path='js/pxc.js') }}";
customElements.define("pxc-activity", PXC);
</script>
<h2>{{ activity_context.name }}</h2>
<div id="simulation-toolbar" style="margin-bottom: 1em; display: flex; gap: 1em; align-items: center;">
  <label>User
    <select id="sim-user">
      {% for u in simulated_users %}
      <option value="{{ u }}" {% if u==current_user %}selected{% endif %}>{{ u }}</option>
      {% endfor %}
    </select>
  </label>
  <label>Permission
    <select id="sim-permission">
      {% for p in permission_levels %}
      <option value="{{ p }}" {% if p==current_permission %}selected{% endif %}>{{ p }}</option>
      {% endfor %}
    </select>
  </label>
  <label>Embed
    <select id="sim-embed">
      <option value="shadow" selected>Shadow DOM</option>
      <option value="native">Sandboxed iframe</option>
    </select>
  </label>
  <div class="offline-banner">Offline - reconnecting...</div>
</div>
<script>
window.addEventListener("pxc:connection", function(e) {
  document.querySelector(".offline-banner").classList.toggle("offline", !e.detail.connected);
});
</script>
<script>
  document.getElementById("sim-user").addEventListener("change", function () {
    document.cookie = "{{ USER_ID_COOKIE }}=" + this.value + "; path=/";
    location.reload();
  });
  document.getElementById("sim-permission").addEventListener("change", function () {
    document.cookie = "pxc_permission=" + this.value + "; path=/";
    location.reload();
  });
</script>
<div id="activity-container">
  <pxc-activity data-context="{{ context_json | escape }}"
    data-src="{{ url_for('activity_ui', activity_type=activity_context.name) }}"
    data-state="{{ state_json | escape }}"
    data-permission="{{ current_permission }}"
    data-pxc-token="{{ pxc_token }}"></pxc-activity>
</div>
<script>
  document.getElementById("sim-embed").addEventListener("change", function () {
    const container = document.getElementById("activity-container");
    const existing = container.querySelector("pxc-activity");
    container.innerHTML = "";
    const el = document.createElement("pxc-activity");
    el.setAttribute("data-context", existing.getAttribute("data-context"));
    el.setAttribute("data-src", existing.getAttribute("data-src"));
    el.setAttribute("data-state", existing.getAttribute("data-state"));
    el.setAttribute("data-permission", existing.getAttribute("data-permission"));
    el.setAttribute("data-pxc-token", existing.getAttribute("data-pxc-token"));
    if (this.value === "native") {
      el.setAttribute("embed", "native");
    }
    container.appendChild(el);
  });
</script>

{% endblock %}
